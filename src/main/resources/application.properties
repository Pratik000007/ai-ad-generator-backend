spring.application.name=ai-ad-generator

# Database - Keep local defaults but allow override
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ai_ad_db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:pratik}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8080

# ? SECRETS - NO REAL DATA HERE
jwt.secret=${JWT_SECRET}
gemini.api.key=${GEMINI_API_KEY}
huggingface.api.token=${HF_TOKEN}
admin.email=${ADMIN_EMAIL}

# ? EMAIL CONFIGURATION
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000